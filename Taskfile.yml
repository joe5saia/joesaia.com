version: "3"

tasks:
  install:
    desc: "Install npm dependencies"
    cmds:
      - npm install

  dev:
    desc: "Start the Astro dev server (http://localhost:4321)"
    cmds:
      - npm run dev

  build:
    desc: "Build the site for production (output: dist/)"
    cmds:
      - npm run build

  preview:
    desc: "Preview the production build locally"
    cmds:
      - npm run preview

  test:
    desc: "Run unit tests"
    cmds:
      - npm test

  post:
    desc: "Scaffold a new blog post (usage: task post TITLE=\"My Title\" SUMMARY=\"A summary\")"
    cmds:
      - npm run post:new -- "{{.TITLE}}" "{{.SUMMARY}}"

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf dist .astro

  deploy:
    desc: "Build and deploy to Cloudflare Pages"
    cmds:
      - npm run deploy

  lint:
    desc: "Type-check the project"
    cmds:
      - npx astro check
